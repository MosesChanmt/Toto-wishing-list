<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Little Princess's Wishing List</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Noto+Sans+TC:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #ffdae0;
            --deep-pink: #ff8da1;
            --cream: #fff9fb;
            --text-grey: #555;
        }

        html { scroll-behavior: smooth; }

        body {
            background-color: var(--cream);
            font-family: 'Noto Sans TC', sans-serif;
            color: var(--text-grey);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Floating Hearts */
        .hearts {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            color: var(--soft-pink);
            animation: float 7s infinite ease-in;
            opacity: 0;
        }

        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        header {
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(to bottom, #ffeef1, var(--cream));
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: var(--deep-pink);
            margin: 0;
        }

        .subtitle { font-size: 1.1rem; margin-top: 15px; color: #888; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .item-card {
            background: white;
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(255, 141, 161, 0.08);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .item-card:hover { transform: translateY(-8px); box-shadow: 0 12px 25px rgba(255, 141, 161, 0.15); }

        .icon { font-size: 45px; margin-bottom: 10px; }
        h3 { color: var(--deep-pink); font-size: 1.1rem; margin: 10px 0 5px 0; }
        p { font-size: 0.85rem; margin-bottom: 15px; color: #999; min-height: 40px; }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: var(--deep-pink);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn:hover { background-color: #ff6b85; }

        /* Scroll to Top Button */
        #scrollTopBtn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background-color: var(--deep-pink);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            opacity: 0; /* Initially hidden */
            transition: opacity 0.3s, background-color 0.3s;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #scrollTopBtn.visible {
            opacity: 0.5; /* 50% transparency */
        }

        #scrollTopBtn:hover {
            opacity: 1; /* Fully visible on hover */
        }

        footer { text-align: center; padding: 60px 20px; color: #b5a4a7; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="hearts" id="heartContainer"></div>

    <header>
        <h1>A Gift for Our Baby Girl To To Chan</h1>
        <p class="intro">謝謝妳們參與她的成長！點擊下方按鈕可查看推薦的款式。<br>Thank you for being part of her journey! Click below to see our favorites.</p>
    </header>

    <div class="container" id="registryGrid"></div>

    <button id="scrollTopBtn" onclick="window.scrollTo(0,0)">↑</button>

    <footer>
        <p>感謝大家的慷慨與愛！<br>Thank you for your generosity and love!</p>
    </footer>

    <script>
        // Ordered from Most Expensive to Cheapest (Estimated)
        const items = [
            { icon: "🪑", zh: "哺乳搖椅", en: "Nursery glider", q: "nursery+glider+chair" },
            { icon: "👑", zh: "高腳餐椅", en: "High chair", q: "Stokke+Tripp+Trapp+high+chair" },
            { icon: "🌙", zh: "床邊嬰兒床", en: "Bedside bassinet", q: "bedside+bassinet" },
            { icon: "😴", zh: "嬰兒搖椅/鞦韆", en: "Baby swing (sleeper)", q: "baby+swing+sleeper" },
            { icon: "🗄️", zh: "尿布收納櫃", en: "Baby changing cabinet", q: "baby+changing+table+cabinet" },
            { icon: "🤱", zh: "嬰兒背帶", en: "Baby carrier", q: "baby+carrier" },
            { icon: "👗", zh: "嬰兒衣櫥套裝", en: "Baby’s closet set", q: "baby+closet+dividers+organizer" },
            { icon: "🚗", zh: "汽座保暖罩", en: "Warm car seat cover", q: "baby+car+seat+cover+winter" },
            { icon: "💤", zh: "防踢被睡袋", en: "Baby sleep sack", q: "baby+sleep+sack" },
            { icon: "🌡️", zh: "嬰兒體溫計", en: "Baby thermometer", q: "baby+thermometer" },
            { icon: "🧺", zh: "尿布更換墊", en: "Changing pad", q: "baby+changing+pad" },
            { icon: "🎧", zh: "嬰兒抗噪耳罩", en: "Baby earmuff", q: "baby+ear+protection+muffs" },
            { icon: "🎀", zh: "嬰兒包巾", en: "Baby swaddle", q: "baby+swaddle+girl" },
            { icon: "🌸", zh: "舒適嬰兒毯", en: "Baby blanket", q: "baby+blanket+girl" },
            { icon: "🧸", zh: "安撫玩偶枕", en: "Plush toy pillow", q: "baby+plush+toy+pillow" },
            { icon: "✂️", zh: "護理套裝", en: "Nail polish, Nasal aspirator, Comb", q: "baby+grooming+kit" },
            { icon: "🌵", zh: "跳舞仙人掌", en: "Moving cactus", q: "dancing+cactus+toy" },
            { icon: "📸", zh: "攝影寫真道具", en: "Baby photo props", q: "newborn+photography+props" },
            { icon: "👜", zh: "便攜隔尿墊", en: "Portable diaper changing mat", q: "portable+diaper+changing+mat" },
            { icon: "🛏️", zh: "可水洗床墊保護墊", en: "Washable bed pad", q: "washable+baby+bed+pad" },
            { icon: "☁️", zh: "嬰兒枕頭", en: "Baby pillow", q: "baby+pillow+for+newborn" },
            { icon: "🧼", zh: "洗髮沐浴組", en: "Baby shampoo, body wash", q: "baby+shampoo+and+body+wash" },
            { icon: "🏁", zh: "黑白視覺字卡", en: "Black white card", q: "baby+high+contrast+cards" },
            { icon: "🍼", zh: "奶粉定量盒", en: "Baby formula dispenser", q: "baby+formula+dispenser" },
            { icon: "🪥", zh: "幼兒潔牙用品", en: "Baby teeth cleaning", q: "baby+toothbrush+kit" },
            { icon: "🧴", zh: "屁屁膏與乳液", en: "Sudocrem, baby cream", q: "Sudocrem+baby+cream" },
            { icon: "🧻", zh: "嬰兒濕紙巾", en: "Baby wipe", q: "baby+wipes" },
            { icon: "🧤", zh: "嬰兒小手套", en: "Baby mitten", q: "baby+mittens" }
        ];

        const grid = document.getElementById('registryGrid');
        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'item-card';
            const amazonLink = `https://www.amazon.com/s?k=${item.q}`;
            card.innerHTML = `
                <div>
                    <span class="icon">${item.icon}</span>
                    <h3>${item.zh}</h3>
                    <p>${item.en}</p>
                </div>
                <a href="${amazonLink}" target="_blank" class="btn">Amazon Search</a>
            `;
            grid.appendChild(card);
        });

        // Show/Hide Scroll Button logic
        const scrollBtn = document.getElementById('scrollTopBtn');
        window.onscroll = function() {
            if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
                scrollBtn.classList.add('visible');
            } else {
                scrollBtn.classList.remove('visible');
            }
        };

        // Floating hearts animation
        const container = document.getElementById('heartContainer');
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 5 + 's';
            heart.style.fontSize = Math.random() * 15 + 10 + 'px';
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 7000);
        }
        setInterval(createHeart, 500);
    </script>
</body>
</html>
